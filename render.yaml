services:
  - type: web
    name: explainable-fraud-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    healthCheckPath: /api/v1/health
    autoDeployTrigger: commit

  - type: web
    name: explainable-fraud-app
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.frontend
    dockerContext: .
    healthCheckPath: /_stcore/health
    autoDeployTrigger: commit
    envVars:
      - key: FRAUD_API_URL
        fromService:
          type: web
          name: explainable-fraud-api
          envVarKey: RENDER_EXTERNAL_URL
